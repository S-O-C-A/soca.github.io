<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIELD REPORTS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#00ff88;--g2:#00ffcc;--b:#00ccff;--b2:#0088ff;
  --dim:#00aa55;--dimmer:#005533;--bg:#040d08;--bg2:#071410;
  --panel:#081a10;--border:#00ff8844;--red:#ff2244;--yellow:#ffcc00;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:13px;min-height:100vh;overflow-x:hidden;cursor:crosshair;position:relative;}
.crt-glow-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 55% at 50% 45%,rgba(0,200,255,0.07) 0%,rgba(0,150,220,0.03) 40%,transparent 70%);}
.crt-glow-overlay{position:fixed;inset:0;z-index:9996;pointer-events:none;background:radial-gradient(ellipse 65% 60% at 50% 48%,rgba(80,200,255,0.035) 0%,transparent 65%);mix-blend-mode:screen;}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.7) 100%);}
.noise{position:fixed;inset:0;z-index:9997;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:noiseAnim 0.15s steps(1) infinite;}
@keyframes noiseAnim{0%{transform:translate(0,0)}20%{transform:translate(-2px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(2px,-2px)}100%{transform:translate(0,0)}}
@keyframes glitch1{0%,94%,100%{transform:none}95%{transform:translate(-3px,0) skewX(-2deg);color:var(--b)}97%{transform:translate(3px,0);color:var(--red)}}
@keyframes glitch2{0%,89%,100%{transform:none;opacity:1;text-shadow:0 0 8px currentColor}90%{transform:translate(4px,-2px);opacity:0.7;text-shadow:3px 0 var(--b),-3px 0 var(--red)}92%{transform:translate(-2px,1px);opacity:0.9;text-shadow:-4px 0 var(--g2)}95%{transform:skewX(5deg) translate(2px);opacity:0.6}98%{transform:none;text-shadow:0 0 8px currentColor}}
@keyframes glitch3{0%,96%,100%{opacity:1;transform:none}97%{opacity:0.3;transform:translate(6px,0)}98%{opacity:0.8;transform:translate(-4px,0)}}
@keyframes rowGlitch{0%,90%,100%{transform:none;opacity:1}91%{transform:translateX(8px);opacity:0.5}93%{transform:translateX(-4px)}95%{transform:none;opacity:0.8}}
/* ── Полноэкранный глитч-флэш ── */
.screen-glitch-flash{position:fixed;inset:0;z-index:10010;pointer-events:none;opacity:0;mix-blend-mode:hard-light;}
.screen-glitch-flash.active{opacity:1;background:repeating-linear-gradient(to bottom,rgba(0,255,136,0.025) 0px,rgba(0,150,200,0.02) 1px,rgba(40,40,40,0.5) 2px,rgba(255,34,68,0.025) 3px,rgba(40,40,40,0.5) 4px);animation:screenFlash 0.18s steps(2);}
@keyframes screenFlash{0%{transform:translate(0,0)}25%{transform:translate(-6px,2px)}50%{transform:translate(5px,-3px)}75%{transform:translate(-3px,1px)}100%{transform:translate(0,0)}}
.r-sep{animation:rowGlitch 9s infinite;}
/* ═══ LOGO — GEAR (ШЕСТЕРЁНКА) — точная копия с основного сайта, низ-лево ═══ */
.gear-logo {
  position: fixed;
  bottom: 40px;
  left: 10px;
  z-index: 10000;
  width: 34px;
  height: 34px;
  pointer-events: none;
  font-family: 'VT323', monospace;
  font-size: 32px;
  font-weight: bold;
  text-align: center;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #00cc66 0%, #00ff88 25%, #00ccff 70%, #0088cc 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 3px rgba(0, 255, 136, 0.3), 0 0 5px rgba(0, 204, 255, 0.2);
  filter: drop-shadow(0 0 2px rgba(0, 200, 100, 0.2));
  transition: none;
  animation: rustyGearSpin 8s infinite cubic-bezier(0.8, 0.2, 0.2, 0.8);
}
.gear-logo::before {
  content: '⛭';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  font-family: 'VT323', monospace;
  font-size: 32px;
  font-weight: bold;
  text-align: center;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #00cc66 0%, #00ff88 25%, #00ccff 70%, #0088cc 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  opacity: 0.25;
  filter: blur(0.8px);
  pointer-events: none;
  animation: rustOverlay 12s infinite;
}
.gear-logo::after {
  content: '⛭';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  font-family: 'VT323', monospace;
  font-size: 32px;
  font-weight: bold;
  text-align: center;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #00ffcc 0%, #00ff88 50%, #00ccff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  opacity: 0;
  pointer-events: none;
  animation: gearGlitchOverlay 5s infinite;
}
@keyframes rustyGearSpin {
  0%, 10% { transform: rotate(0deg); }
  12% { transform: rotate(0deg); }
  14% { transform: rotate(8deg); }
  16% { transform: rotate(0deg); }
  18%, 22% { transform: rotate(0deg); }
  24% { transform: rotate(0deg); }
  26% { transform: rotate(12deg); }
  28% { transform: rotate(4deg); }
  30% { transform: rotate(0deg); }
  32%, 40% { transform: rotate(0deg); }
  42% { transform: rotate(0deg); }
  44% { transform: rotate(12deg); }
  46% { transform: rotate(18deg); }
  48% { transform: rotate(6deg); }
  50% { transform: rotate(0deg); }
  52%, 70% { transform: rotate(0deg); }
  72% { transform: rotate(0deg); }
  74% { transform: rotate(15deg); }
  76% { transform: rotate(25deg); }
  78% { transform: rotate(10deg); }
  80% { transform: rotate(0deg); }
  82%, 90% { transform: rotate(0deg); }
  92% { transform: rotate(0deg); }
  94% { transform: rotate(15deg); }
  96% { transform: rotate(30deg); }
  98% { transform: rotate(20deg); }
  100% { transform: rotate(30deg); }
}
@keyframes rustOverlay {
  0%, 100% { opacity: 0.25; filter: blur(0.8px); }
  20% { opacity: 0.35; filter: blur(1px); }
  40% { opacity: 0.2; filter: blur(0.5px); }
  60% { opacity: 0.4; filter: blur(1.2px); }
  80% { opacity: 0.2; filter: blur(0.6px); }
}
@keyframes gearGlitchOverlay {
  0%, 100% { opacity: 0; transform: translateX(0); }
  8% { opacity: 0.5; transform: translateX(-1.5px); }
  9% { opacity: 0; transform: translateX(1.5px); }
  15% { opacity: 0; }
  22% { opacity: 0.4; transform: translateX(-1px); }
  23% { opacity: 0; transform: translateX(1px); }
  45% { opacity: 0; }
  68% { opacity: 0.3; transform: translateX(-0.5px); }
  69% { opacity: 0; transform: translateX(0.5px); }
  85% { opacity: 0; }
  92% { opacity: 0.5; transform: translateX(-2px); }
  93% { opacity: 0; transform: translateX(2px); }
}
.gear-logo.glitch-instant { animation: gearInstantGlitch 0.2s steps(3); }
@keyframes gearInstantGlitch {
  0% { transform: translateX(0) rotate(0deg); }
  25% { transform: translateX(-3px) rotate(5deg); }
  50% { transform: translateX(3px) rotate(-4deg); }
  75% { transform: translateX(-1px) rotate(2deg); }
  100% { transform: translateX(0) rotate(0deg); }
}
.gear-logo.critical-glitch { animation: gearCritGlitch 0.4s infinite; }
@keyframes gearCritGlitch {
  0%, 100% { transform: translateX(0) rotate(0deg); opacity: 1; }
  20% { transform: translateX(-4px) rotate(10deg); opacity: 0.5; filter: blur(0.5px); }
  40% { transform: translateX(4px) rotate(-8deg); opacity: 0.8; }
  60% { transform: translateX(-2px) rotate(6deg); opacity: 0.3; filter: blur(1px); }
  80% { transform: translateX(2px) rotate(-4deg); opacity: 0.9; }
}
.r-text .hi,.r-text .hib{animation:glitch2 2.5s infinite;}
/* ── Утилиты сильного глитча для отдельных слов (как на основном сайте) ── */
.c1{animation:glitch1 3s 0.1s infinite;display:inline-block;}
.c2{animation:glitch2 3.5s 0.4s infinite;display:inline-block;}
.c3{animation:glitch3 2.5s 0.2s infinite;display:inline-block;}
.heavy-corrupt{animation:glitch2 1.1s infinite;filter:blur(0.8px);letter-spacing:0.02em;opacity:0.7;display:inline-block;}
.word-flash{animation:wordFlash 0.35s steps(2);}
@keyframes wordFlash{0%{transform:translate(0,0);color:inherit}25%{transform:translate(-3px,1px);color:var(--red);text-shadow:2px 0 var(--b),-2px 0 var(--red)}50%{transform:translate(3px,-1px);color:var(--b);filter:blur(0.6px)}75%{transform:translate(-2px,0);color:var(--g2)}100%{transform:translate(0,0);color:inherit}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan{0%{top:-10%}100%{top:110%}}
@keyframes flicker{0%,100%{opacity:1}49%{opacity:1}50%{opacity:0.5}51%{opacity:1}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.wrapper,.topbar,.bottombar{position:relative;z-index:1;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--panel);height:36px;overflow:hidden;}
.tb-seg{padding:0 14px;height:100%;display:flex;align-items:center;border-right:1px solid var(--border);font-size:11px;letter-spacing:0.1em;white-space:nowrap;}
.tb-seg.brand{font-family:'VT323',monospace;font-size:22px;color:var(--g);letter-spacing:0.15em;}
.tb-spacer{flex:1;}
.tb-time{padding:0 12px;font-size:9px;color:var(--b);letter-spacing:0.06em;border-left:1px solid var(--border);white-space:nowrap;}

/* ── LAYOUT ── */
.wrapper{display:flex;height:calc(100vh - 36px - 28px);}

/* ── INDEX ── */
.report-index{width:250px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(0,0,0,0.2);}
.index-header{padding:8px 12px;border-bottom:1px solid var(--border);background:rgba(0,255,136,0.04);font-size:9px;letter-spacing:0.18em;color:var(--dimmer);display:flex;justify-content:space-between;}
.index-header span{color:var(--g);}
.index-search{padding:6px 8px;border-bottom:1px solid var(--border);}
.index-search input{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--g);font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 7px;outline:none;}
.index-search input:focus{border-color:var(--g2);}
.index-search input::placeholder{color:var(--dimmer);}
.index-list{flex:1;overflow-y:auto;}
.index-list::-webkit-scrollbar{width:2px;}
.index-list::-webkit-scrollbar-thumb{background:var(--dimmer);}
.report-entry{padding:9px 12px;border-bottom:1px solid rgba(0,255,136,0.06);cursor:pointer;transition:background 0.15s;position:relative;}
.report-entry:hover{background:rgba(0,255,136,0.05);}
.report-entry.active{background:rgba(0,255,136,0.08);}
.report-entry.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--g);box-shadow:0 0 6px var(--g);}
.entry-code{font-size:8px;color:var(--b);letter-spacing:0.14em;margin-bottom:2px;}
.entry-title{font-size:11px;color:var(--g);margin-bottom:3px;}
.entry-meta{display:flex;gap:6px;align-items:center;}
.entry-tag{font-size:7px;padding:1px 5px;border:1px solid;letter-spacing:0.1em;}
.entry-tag.anomaly{border-color:rgba(255,204,0,0.4);color:var(--yellow);}
.entry-tag.planet{border-color:rgba(0,204,255,0.4);color:var(--b);}
.entry-tag.unknown{border-color:rgba(255,34,68,0.4);color:var(--red);}
.entry-date{font-size:7px;color:var(--dimmer);margin-left:auto;}

/* ── VIEWER ── */
.report-viewer-wrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;}
.scan-line{position:absolute;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(0,255,136,0.1),transparent);animation:scan 7s linear infinite;pointer-events:none;z-index:5;}
.report-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.3);flex-shrink:0;overflow-x:auto;}
.report-tabs::-webkit-scrollbar{height:2px;}
.report-tab{padding:0 14px;height:30px;display:flex;align-items:center;font-size:9px;letter-spacing:0.12em;color:var(--dimmer);border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.report-tab:hover{color:var(--g);background:rgba(0,255,136,0.04);}
.report-tab.active{color:var(--g);background:rgba(0,255,136,0.07);border-bottom:2px solid var(--g);}
.report-viewer{flex:1;overflow-y:auto;padding:0;}
.report-viewer::-webkit-scrollbar{width:3px;}
.report-viewer::-webkit-scrollbar-thumb{background:var(--dimmer);}
.tab-content{display:none;padding:20px 22px 32px;animation:fadeIn 0.2s ease;}
.tab-content.active{display:block;}

/* ── CONTENT BLOCKS ── */
.r-heading{font-size:10px;letter-spacing:0.22em;color:var(--dimmer);margin-bottom:10px;border-bottom:1px solid rgba(0,255,136,0.1);padding-bottom:5px;margin-top:6px;}
.r-text{font-size:14px;line-height:2;color:var(--dim);letter-spacing:0.03em;}
.r-text .hi{color:var(--g);text-shadow:0 0 8px rgba(0,255,136,0.5);}
.r-text .hib{color:var(--b);text-shadow:0 0 8px rgba(0,200,255,0.4);}
.r-text .hiy{color:var(--yellow);text-shadow:0 0 8px rgba(255,200,0,0.4);}
.r-text .strike{text-decoration:line-through;opacity:0.35;}
.r-text .ul{border-bottom:2px solid var(--g);padding-bottom:1px;}
.r-text .big{font-family:'VT323',monospace;font-size:28px;color:var(--g2);vertical-align:middle;line-height:1;}
.r-text .corrupt{color:var(--dimmer);filter:blur(0.5px);animation:glitch2 2.2s infinite;}
.r-text .ghost{opacity:0.18;color:var(--g);}
.r-text .blur-txt{filter:blur(1.5px);color:var(--dim);}
.r-text .rainbow{background:linear-gradient(90deg,var(--g),var(--b),var(--g2),var(--yellow),var(--g));background-size:300% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:rainbowMove 3s linear infinite;}
@keyframes rainbowMove{0%{background-position:0%}100%{background-position:300%}}
.r-text .skew{display:inline-block;transform:skewX(-12deg);color:var(--g2);}
.r-text .spread{letter-spacing:0.4em;color:var(--b);}
.r-text .blink{animation:blink 1.2s infinite;color:var(--red);}
.r-text .mark{background:rgba(0,255,136,0.15);padding:1px 5px;color:var(--g);}
.r-text .mark-y{background:rgba(255,200,0,0.12);padding:1px 5px;color:var(--yellow);}
.r-text .mark-r{background:rgba(255,34,68,0.12);padding:1px 5px;color:var(--red);}
.r-text .HUGE{font-family:'VT323',monospace;font-size:48px;color:var(--g);text-shadow:0 0 20px var(--g);display:inline-block;line-height:1;vertical-align:middle;}
hr.r-div{border:none;border-top:1px solid rgba(0,255,136,0.08);margin:18px 0;}
.r-sep{display:flex;align-items:center;gap:8px;margin:22px 0;font-size:10px;color:var(--dimmer);letter-spacing:0.2em;}
.r-sep::before,.r-sep::after{content:'';flex:1;height:1px;background:rgba(0,255,136,0.08);}
.r-data{display:flex;flex-direction:column;gap:6px;margin:8px 0;}
.r-row{display:flex;align-items:baseline;gap:10px;font-size:13px;}
.r-key{color:var(--dimmer);letter-spacing:0.1em;min-width:170px;flex-shrink:0;}
.r-val{color:var(--g);letter-spacing:0.05em;}
.r-val.b{color:var(--b);}
.r-val.y{color:var(--yellow);}
.r-val.r{color:var(--red);}
.r-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin:10px 0;}
.r-stat{border:1px solid rgba(0,255,136,0.15);background:rgba(0,0,0,0.3);padding:12px 14px;}
.r-stat-lbl{font-size:9px;color:var(--dimmer);letter-spacing:0.1em;margin-bottom:2px;}
.r-stat-val{font-family:'VT323',monospace;font-size:34px;color:var(--g);}
.r-stat-unit{font-size:9px;color:var(--dim);margin-left:2px;}
.r-soca{margin:14px 0;padding:12px 16px;border-left:3px solid rgba(0,180,255,0.5);background:rgba(0,25,45,0.35);font-size:13px;color:rgba(0,195,255,0.65);letter-spacing:0.03em;line-height:1.7;font-style:italic;}
.r-soca::before{content:'⛍ SOCA //';display:block;font-size:9px;letter-spacing:0.2em;color:rgba(0,140,190,0.4);margin-bottom:4px;font-style:normal;}
.r-smaily{margin:14px 0;padding:12px 16px;border-left:3px solid rgba(255,180,50,0.55);background:rgba(45,28,0,0.35);font-size:13px;color:rgba(255,195,90,0.8);letter-spacing:0.02em;line-height:1.7;}
.r-smaily::before{content:'☺ SMAILY //';display:block;font-size:9px;letter-spacing:0.2em;color:rgba(255,170,50,0.55);margin-bottom:4px;}
.r-note{margin:14px 0;padding:13px 16px;border:1px dashed rgba(0,255,136,0.2);background:rgba(0,12,6,0.5);font-size:14px;color:var(--dim);line-height:1.9;}
.r-note::before{content:'// KOKO';display:block;font-size:9px;letter-spacing:0.2em;color:var(--dimmer);margin-bottom:6px;}
.r-alert{margin:14px 0;padding:12px 16px;border:1px solid rgba(255,204,0,0.25);background:rgba(18,13,0,0.55);font-size:13px;color:var(--yellow);line-height:1.7;}
.r-alert::before{content:'⚠ //';display:block;font-size:9px;letter-spacing:0.2em;color:rgba(180,140,0,0.4);margin-bottom:4px;}
.ph-wrap{display:inline-block;position:relative;}
.ph-wrap.left{float:left;margin:6px 18px 10px 0;}
.ph-wrap.right{float:right;margin:6px 0 10px 18px;}
.ph-wrap.center{display:block;margin:16px auto;text-align:center;}
.ph-wrap.tilt1{transform:rotate(2.5deg);}
.ph-wrap.tilt2{transform:rotate(-1.8deg);}
.ph-wrap.tilt3{transform:rotate(3.8deg);}
.ph-wrap.tilt4{transform:rotate(-3.1deg);}
.ph-wrap.tilt5{transform:rotate(1.2deg);}
.ph-wrap.tilt6{transform:rotate(-4.5deg);}
.ph-box{width:180px;height:180px;border:1px solid var(--border);background:rgba(0,0,0,0.6);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;position:relative;}
.ph-box.sm{width:150px;height:150px;}
.ph-box.lg{width:260px;height:260px;}
.ph-box img{width:100%;height:100%;object-fit:cover;display:none;}
.ph-box .ph-icon{font-size:28px;opacity:0.25;}
.ph-box .ph-path{font-size:9px;color:var(--dimmer);letter-spacing:0.06em;text-align:center;padding:0 4px;}
.ph-cap{font-size:11px;max-width:340px;color:var(--dimmer);letter-spacing:0.08em;margin-top:3px;max-width:160px;line-height:1.4;}
.clearfix::after{content:'';display:table;clear:both;}

/* sticky notes — various colors */
.sticky{display:inline-block;padding:11px 14px;font-size:13px;line-height:1.7;position:relative;max-width:180px;word-break:break-word;}
.sticky::before{font-size:14px;position:absolute;top:-9px;left:6px;}
.sticky.yellow{background:rgba(255,220,0,0.07);border:1px solid rgba(255,200,0,0.2);color:#998800;}
.sticky.yellow::before{content:'📌';}
.sticky.green{background:rgba(0,255,100,0.06);border:1px solid rgba(0,220,80,0.2);color:#007733;}
.sticky.green::before{content:'📎';}
.sticky.blue{background:rgba(0,150,255,0.06);border:1px solid rgba(0,150,255,0.2);color:#005599;}
.sticky.blue::before{content:'🔹';}
.sticky.red{background:rgba(255,50,50,0.06);border:1px solid rgba(255,50,50,0.2);color:#992222;}
.sticky.red::before{content:'❗';}
.sticky.purple{background:rgba(180,0,255,0.05);border:1px solid rgba(180,0,255,0.18);color:#660099;}
.sticky.purple::before{content:'🔷';}

.photo-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(2,8,5,0.92);z-index:10001;display:flex;align-items:center;justify-content:center;animation:modalFadeIn 0.15s ease;}

.photo-modal-header{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:1px solid var(--border);background:rgba(0,255,136,0.04);font-size:10px;letter-spacing:0.14em;color:var(--dim);flex-shrink:0;}

<script>
function pad(n){return String(n).padStart(2,'0');}
function updateClock(){
  const n=new Date(),M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const s=new Date(n);s.setFullYear(n.getFullYear()-53);

}
updateClock();setInterval(updateClock,1000);

function ph(path,cap,size,pos,tilt){
  size=size||'';pos=pos||'center';tilt=tilt||'';

      <div class="ph-path">${path}</div>
    </div>
    ${cap?`<div class="ph-cap">${cap}</div>`:''}
  </div>`;
}

<div style="font-family:'VT323',monospace;font-size:64px;color:var(--g);text-shadow:0 0 30px rgba(0,255,136,0.4);letter-spacing:0.1em;margin:8px 0 4px;animation:glitch1 8s infinite">KAELA</div>

<div style="font-size:9px;color:var(--b);letter-spacing:0.15em;margin-bottom:14px;">PD-04 // DAY 0136 // 06 FEB 1974</div>

  <div class="hbox" style="font-size:13px;border-left-color:var(--g2);background:rgba(0,255,200,0.04);">

<div class="r-sep">ИТОГОВЫЙ ВЫВОД</div>

    </p>
    <ul class="r-list" style="gap:8px;">
      <li><span style="color:#ff6644;">Crux</span> и <span style="color:#cc8833;">Erden</span> — две звезды, которые работают в паре. Crux даёт тепло. Erden даёт свет. Они дополняют друг друга.</li>

  <div class="r-smaily">ЖИВ! Официально подтверждаю: бровь заживёт, плечо перестанет ныть к среде, а вот та царапина на обшивке — это уже не ко мне. Шов наложен, антисептик закапал куда надо, красавчик держался молодцом для человека который только что упал с неба. Кстати — 4-5g это ВООБЩЕ не шутки, я проверил по учебнику, ты держишься лучше учебника.</div>

  голова немного звенела первые часа два, но это нормальная реакция на удар, не сотрясение — СОКА проверила зрачки, координацию, всё было в норме.
  в целом — повезло. корабль пострадал сильнее чем я.<br/><br/>
  а потом я вышел.
</p>

<p class="r-text" style="margin-top:12px;">
  а потом я её увидел.<br/><br/>
  окей, я знаю как это прозвучит. но первое слово которое пришло мне в голову, когда я посмотрел вокруг — было <span class="HUGE" style="font-size:34px;">"живая"</span>.
  не в смысле "тут есть растения значит планета живая" — это банально, тут любая планета с биосферой технически "живая".
  я имею в виду другое. было ощущение что <span class="ul">сама земля</span> под ногами — не просто субстрат для жизни, а что-то целое, единое, и оно меня <span class="rainbow">заметило</span>.<br/><br/>
  я записал это сразу, в первые двадцать минут после выхода, пока ощущение было свежим, потому что знал — если подожду, рациональная часть мозга это объяснение перепишет и сотрёт.

  вернулся к этой теме спустя неделю, когда уже выровнялся психологически и смог делать нормальные замеры, а не просто описывать ощущения.<br/><br/>
  состав воздуха я уже фиксировал в паспорте: <span class="hib">78% N₂, 18% O₂</span>, остальное — органические пары и флуоресцентные соединения.
  но тут хочу расписать подробнее, потому что одних цифр недостаточно чтобы понять, каково это на самом деле.

    <strong style="color:var(--b)">ЗАПАХ</strong><br/>
    "ледяная вода" — не запах холода, а ощущение <em>плотности</em> воздуха на вдохе, будто вдыхаешь что-то более вязкое, с лёгким металлическим привкусом.
  </div>
  <div class="hbox y" style="font-size:12px;">
    <strong style="color:var(--yellow)">ОРГАНИКА</strong><br/>
    концентрация органических паров ~3–4% от общего объёма атмосферы. грубая оценка по спектрометру, погрешность ±1%.
  </div>

${ph("картинк/kaela/air_glow.png","ночной воздух с флуоресцентными частицами — снято с длинной выдержкой, иначе глазом почти не видно","lg","left","tilt3")}

<p class="r-text">
  частицы в воздухе светятся. не постоянно — в основном их свечение заметно в темноте (точнее в той тусклой полу-темноте которая тут максимум бывает) или при определённом угле падения света от Crux/Erden.
  я заметил это впервые на третий день, когда стоял снаружи в сумерках и увидел что воздух перед лицом будто слегка мерцает — мелкие точки, голубовато-зелёные, плывущие очень медленно, как пыль в солнечном луче, только сами создающие свет, а не отражающие.<br/><br/>
  я попытался сфотографировать это сразу — не получилось, частицы слишком тусклые для обычной съёмки. снимок выше сделан с выдержкой примерно <span class="hi" style="font-family:'VT323',monospace;font-size:18px;">8 секунд</span> (настройки камеры Пандемониума, не у меня была возможность точно регулировать), и даже так свечение еле уловимо на фото — глазом в темноте оно заметнее.
</p>

<div class="r-soca" style="margin-top:10px;">Спектральный анализ флуоресцентных частиц показывает пик излучения в диапазоне 480–520 нм (голубовато-зелёный). Источник происхождения частиц не установлен — возможно биологический (споры, пыльца микроорганизмов), возможно минеральный (мелкодисперсная пыль с кристаллическими включениями). Для точного определения требуется лабораторный анализ, недоступный на борту.</div>

<div class="r-note" style="transform:rotate(-0.7deg);font-size:12px;margin-top:10px;">
  если честно я не уверен биологическое это или минеральное. иногда смотрю на это свечение и думаю — а вдруг это и есть Каэла, в самом буквальном смысле, просто очень маленькими частицами разлита в воздухе. знаю что это звучит как бред уставшего человека в 2 часа ночи (по земному времени, тут другой счёт). но записываю эту мысль, потому что обещал себе записывать всё.
</div>

<div class="r-soca">Низкая вариативность температуры и давления исключает формирование конвективных ячеек достаточной мощности для образования штормовых систем. Облачный покров скорее равномерно насыщается влагой и сбрасывает её малыми порциями, чем накапливает энергию для масштабных осадков.</div>

<p class="r-text">
  нашёл крупный водоём примерно в <span class="hi">12 км</span> от места посадки, дошёл туда за день пешком (с остановками — гравитация позволяет идти долго без сильной усталости).<br/><br/>
  <strong style="color:var(--b)">есть ли большие океаны?</strong> да, но не огромные. я не могу сказать точные размеры всей водной системы планеты — Каэла большая, я физически не смогу её всю обойти за время миссии.
  но тот океан который я нашёл — по моим прикидкам (смотрел с возвышенности, оценивал на глаз плюс примерная скорость ходьбы вдоль берега) — береговая линия видимой части тянется минимум на <span class="mark">15–20 км</span> в одну сторону, дальше горизонт скрывает продолжение.
  это не "огромный океан" в масштабе земных, но точно не маленькое озеро.
</p>

<div class="r-sep" style="margin-top:16px;">АНАЛИЗ ВОДЫ // ПРОБА СОКИ</div>

  <div class="sticky blue t4" style="flex-shrink:0;width:200px;font-size:12px;">зашёл в воду по пояс, сфотографировался для масштаба (и потому что хотел). вода тёплая даже на глубине — что странно, на Земле даже тёплые моря холоднее у дна.</div>

  вода в них тёплая, иногда почти горячая (один источник оценил градусов под <span class="hi">38–40°C</span>, не мерил точно, было слишком приятно чтобы доставать термометр),
  слегка минерализованная — на вкус (да, попробовал, безопасно судя по анализу СОКИ) чуть солоноватая, с лёгким металлическим послевкусием.
</p>

${ph("картинк/kaela/hot_spring.png","горячий источник среди мхов и камней — один из трёх найденных","","center","tilt3")}

<div class="sticky purple t5 sticky-right" style="max-width:190px;">сидел в одном источнике минут сорок просто потому что мог. это было первое по-настоящему расслабляющее ощущение с момента посадки. записываю это не как науку, а просто потому что это было хорошо.</div>

<p class="r-text">
  <strong style="color:var(--g)">почва.</strong> мягкая, но при этом твёрдая — звучит как противоречие, но на ощупь именно так.
  не проваливается под ногами как песок и не пружинит как мох, но и не твёрдая как камень. я бы описал это как "податливая" — даёт чуть-чуть, потом держит вес.
  замерил глубину следа от ботинка в нескольких местах: в среднем <span class="hi">3–5 мм</span> вдавливания, и почва восстанавливает форму примерно за <span class="hi">10–15 минут</span> после того как я ухожу — проверял, возвращался к одному и тому же следу несколько раз.<br/><br/>
  это последнее меня реально удивило. обычная почва так не работает — если ты её примял, она остаётся примятой, пока что-то снова её не взрыхлит.
  <span class="mark">а тут она будто сама "забывает" что на неё наступали.</span>
</p>

<div class="r-soca">Восстановление формы почвы за фиксированное время может объясняться высоким содержанием упругих органических волокон в верхнем слое субстрата — аналог некоторых земных мхов-сфагнумов, которые тоже частично восстанавливают форму после нагрузки. Полное объяснение требует анализа состава, недоступного на текущем оборудовании.</div>

<p class="r-text" style="margin-top:12px;">
  <strong style="color:var(--b)">камни с идеально прямыми трещинами.</strong> уже писал про это в разделе про спутник Sanoer (там тоже такие трещины) — но тут, на самой поверхности Каэлы, нахожу то же самое.
  трещины в некоторых камнях идут параллельно друг другу с точностью которая визуально кажется неестественной. замерил угол между соседними трещинами на одном образце —
  отклонение было всего <span class="hi">2–3 градуса</span> на протяжении почти 30 см камня. для сравнения, обычные тектонические трещины (смотрел справочные материалы в памяти Пандемониума) обычно имеют разброс углов <span class="hib">15–20 градусов</span> и больше.
</p>

${ph("картинк/kaela/crystal_rocks.png","камни с вкраплениями кристаллов — параллельные трещины видны прямо на поверхности","lg","right","tilt2")}

<p class="r-text">

  болота — по той же причине, нет стоячей воды надолго. пустыни — климат слишком стабилен по влажности, нет резких засушливых зон
  (обошёл уже приличный радиус, нигде не встретил ничего похожего на сухой песчаный участок, кроме небольшого пляжа у моря, но это другое — расскажу позже отдельно).
</p>

  собрал уже <span class="HUGE" style="font-size:30px;">7</span> разных образцов кристаллов за последние недели, решил их систематизировать, пока не забыл откуда какой.<br/><br/>
  уже писал в паспорте — кристаллы не отражают свет нормально, они его как будто "держат" секунду, потом отпускают. теперь у меня есть больше данных чтобы это описать точнее.
</p>

<p class="r-text">
  образец #1 — призматический, прозрачный с лёгким зелёным отливом, время удержания света примерно <span class="hi">0.4–0.6 секунды</span>
  (засекал на глаз с секундомером, не точная наука, но воспроизводимо при повторных тестах).<br/><br/>
  образец #3 — тот самый, про который уже писал (геометрия) — самый странный из всех. не просто держит свет дольше остальных
  (около <span class="hi" style="font-family:'VT323',monospace;font-size:18px;">1.2 секунды</span> — вдвое больше среднего), но иногда, очень редко, замечал что он светится <span class="blink" style="color:var(--yellow)">сам</span>, без внешнего источника, на долю секунды.
  зафиксировал это явление <span class="mark-y">трижды за две недели</span> наблюдения. СОКА не смогла объяснить это стандартной флуоресценцией — для неё нужно накопление энергии от внешнего света,
  а тут вспышка происходила даже когда образец лежал в темноте контейнера несколько часов.
</p>

<div class="r-soca">Образец #3 демонстрирует спонтанную люминесценцию в отсутствие очевидного источника возбуждения. Зафиксировано три случая за 14 дней хранения. Возможные объяснения: остаточная энергия от длительного накопления (маловероятно при данной продолжительности темновой фазы), либо неизвестный механизм генерации света. Рекомендую дальнейшее наблюдение.</div>

<p class="r-text" style="margin-top:10px;">этот образец не классифицирую. честно — не знаю что это. записываю как есть.</p>

${ph("картинк/kaela/surface_rocks.png","камни и кристаллы поверхности — образец #3 третий слева в нижнем ряду","lg","left","tilt1")}

<p class="r-text">
  <strong style="color:var(--g2)">возможная связь со свечением мха и атмосферы.</strong> пока только догадка, но она кажется логичной: если эти кристаллы умеют "держать" свет дольше обычного материала,
  а в воздухе плавают флуоресцентные частицы которые тоже накапливают и переизлучают свет (раздел 2) — может, это один и тот же механизм, просто проявляющийся в разных формах материи на планете.
  твёрдой (кристаллы), газообразной (частицы в воздухе), и, возможно, биологической (светящийся мох, до которого я ещё доберусь).
</p>

<div class="hbox b" style="margin:14px 0;font-size:13px;">
  если это правда — то вся планета работает как один большой механизм хранения и медленного возврата света. что было бы по-настоящему невероятно, если подтвердится.
  <span class="corrupt">я пока не уверен, но мне нравится эта мысль.</span>
</div>

<div style="font-size:9px;color:var(--b);letter-spacing:0.12em;margin-bottom:12px;">PD-04 // DAY 0061 // 24 NOV 1973</div>

<p class="r-text">
  это, наверное, самый большой раздел из всех что я пока писал, и я подозреваю что он будет расти дальше — растений тут невероятно много, и они все разные настолько, что я даже не уверен что правильно их классифицирую как "растения" в земном смысле этого слова.<br/><br/>
  общее наблюдение прежде чем перейти к конкретным видам: тут нет чёткой границы между "мхом", "лишайником" и "деревом" в том смысле в каком я привык это понимать. растительность здесь больше похожа на спектр форм, плавно переходящих одна в другую.
  я насчитал уже больше <span class="hi">15 визуально различимых типов</span> растительности за два месяца наблюдений, и продолжаю находить новые. для классификации использую упрощённую систему по высоте и структуре —
  почвопокровные (до 10 см), кустарниковые (10 см — 1 м), древовидные (выше 1 м) — это не настоящая ботаническая таксономия, я не специалист, но хоть какая-то система нужна чтобы не путаться в записях.
</p>

<div class="hbox b" style="margin:14px 0;font-size:13px;">
  важная деталь которую раньше не упоминал: тут действительно есть <strong style="color:var(--b)">леса</strong>. целые участки плотной растительности, деревья растут достаточно близко друг к другу чтобы кроны соприкасались.
  прошёл через один такой массив примерно <span class="hi">4 километра</span> шириной, и почти на всём протяжении земля была занята растительностью — открытых, полностью пустых участков на Каэле видел на удивление мало.
  наибольшая открытая площадь которую зафиксировал — около <span class="hi">200×150 метров</span> каменистой проплешины, и даже там по краям были отдельные кусты "стеклянного плюща".
</div>

<div class="r-sep" style="margin-top:18px;">ДЕРЕВЬЯ // НЕОЖИДАННОЕ СХОДСТВО</div>

<div style="display:flex;gap:18px;align-items:flex-start;margin:12px 0;">
  <div style="flex:1.3;">
    <p class="r-text">
      и вот тут самое неожиданное наблюдение за весь период: некоторые деревья выглядят почти как тропические земные. структура похожа на то что я видел на учебных голограммах земных тропических лесов в архиве Пандемониума —
      широкие листовые пластины, многоярусная структура кроны, воздушные корни у некоторых экземпляров. я специально сравнил силуэт одного дерева с архивным изображением баньяна — сходство по общей форме кроны и характеру ветвления
      выше, чем я ожидал увидеть на планете с совершенно другой звёздной системой. но это, конечно, конвергенция формы, не родство — внутренняя структура (когда брал образцы) совсем не похожа на земную целлюлозную,
      скорее похожа на ту же гелеобразную массу что я описывал у других видов, просто заключённую в более плотную внешнюю оболочку.<br/><br/>
      высота таких деревьев — замерил несколько, от <span class="hi">4 до примерно 9 метров</span>, самое высокое найденное было ближе к <span class="hi">11 метрам</span> (оценка по тени и углу падения света от Crux, не точный замер, но методика рабочая — знаю угол и могу посчитать высоту по простой тригонометрии, плюс-минус метр погрешности).
    </p>
  </div>
  <div style="flex-shrink:0;width:220px;">

      <div style="font-size:9px;color:var(--dimmer);text-align:center;margin-top:3px;letter-spacing:0.08em;">"тропическое" дерево // силуэт, зарисовка с натуры</div>
    </div>

<p class="r-text" style="margin-top:10px;">
  биолюминесценция почти у всех видов — голубовато-зелёное свечение уже описывал в разделе про воздух, и отдельно про мох. есть и пурпурное, реже встречается, в основном у более крупных кустарниковых форм.
  яркость свечения отдельных видов оценивал субъективно по шкале от 1 до 5 (1 — едва уловимо, 5 — достаточно ярко чтобы читать), и большинство видов попадает в диапазон 2–3,
  "колокольный мох" (опишу ниже) — единственный найденный вид который оценил на 5.
</p>

      <strong style="color:var(--g2)">"стеклянный плющ".</strong> почвопокровный, растёт по поверхности камней, тонкие полупрозрачные побеги толщиной <span class="hi">2–4 мм</span> (замерял штангенциркулем из аптечки), цвет — бледно-зелёный с лёгкой голубизной.
      внутри видны тонкие светящиеся прожилки. сделал срез одного побега для анализа — внутренняя структура представляет собой гелеобразную массу без чёткой клеточной организации, видимой в моё переносное увеличительное стекло
      (10-кратное, не настоящий микроскоп, так что детальная клеточная структура могла остаться незамеченной). на срезе масса слабо засветилась сама на время около <span class="hi">10 секунд</span>, затем погасла —
      СОКА предполагает что это была реакция повреждённой ткани на контакт с воздухом, возможный аналог окислительного стресс-ответа у земных растений, хотя точный механизм неизвестен.
    </p>

<div style="display:flex;gap:18px;align-items:flex-start;margin:14px 0;">
  <div style="flex:1;">
    <p class="r-text">
      <strong style="color:var(--g2)" style="color:#cc66ff">"колокольный мох".</strong> кустарниковая форма, растёт пучками, высота отдельного побега <span class="hi">5–8 см</span>, на конце раскрытая структура наподобие колокольчика диаметром 1–2 см,
      светится пурпурным наиболее ярко из всех найденных видов. интересная деталь — колокольчики синхронно слегка покачиваются даже в отсутствие ветра (проверял отсутствие воздушного потока влажным пальцем, не было заметного движения воздуха).
      цикл покачивания — примерно раз в <span class="hi">12–15 секунд</span> по замерам с секундомером, и соседняя группа этого вида (наблюдал популяцию примерно из 30 экземпляров) двигалась практически синфазно,
      с минимальным разбросом по времени между соседними растениями. не нашёл объяснения этой синхронности — это не похоже на случайный шум, слишком стабильный период.

      на просвет видна сетчатая структура жилок очень похожая по рисунку на земные широколиственные виды, что меня больше всего и удивило учитывая что эволюционная история тут абсолютно независимая.

  выясняется что такая жидкость встречается у <span class="mark-r">многих, но не у всех</span> растений, независимо от их внешнего вида и формы — нашёл её и у почвопокровных, и у древовидных форм.
  у "костяного дерева", например, такой жидкости нет вообще, а у "тропического" вида — есть, в небольшом количестве. полноценный раздел про эту жидкость напишу отдельно, она заслуживает отдельного подробного разбора.

<p class="r-text">
  теперь про движение растений — это то, что я считаю самым важным наблюдением во всём разделе, и хочу описать его максимально точно, с конкретной методологией, а не просто словами "оно двигалось".<br/><br/>
  провёл небольшой контролируемый эксперимент. подошёл к одному кусту "колокольного мха", встал на фиксированном расстоянии (около <span class="hi">40 см</span> от ближайшего побега, отмерил шагами и потом уточнил рулеткой из аптечки)
  и оставался неподвижным <span class="hi">20 минут</span>, фиксируя положение конкретного выбранного колокольчика каждые 2 минуты на глаз относительно воображаемой оси, заданной направлением на ближайший камень позади растения.
</p>

<p class="r-text">
  важная методологическая деталь: специально расположился так, чтобы не загораживать растению ни одну из звёзд, чтобы исключить простой фототропизм (рост к свету) как объяснение.
  движение шло именно в мою сторону, а не к источнику света — это ключевой момент всего наблюдения.
</p>

<div class="r-soca">Направленное движение без видимого фотостимула при текущем уровне данных не имеет стандартного объяснения в рамках известной ботаники. Зафиксированная скорость отклика (порядка 1.5–2° в минуту на начальном этапе) превышает типичные показатели тигмонастических реакций у известных земных видов — например, Mimosa pudica реагирует быстрее, но на прямой контакт, а не на приближение без касания. Возможные объяснения: реакция на тепловое излучение тела, на изменение концентрации CO2 от дыхания, либо задействован тот же механизм что лежит в основе общего псионического поля планеты.</div>

<div class="r-note" style="transform:rotate(-0.6deg);margin-top:10px;">
  я лично склоняюсь ко второму варианту (последнему, который СОКА произнесла с паузой), но это уже не наука, а моё личное ощущение, и я хочу это явно разграничить в записи.
</div>

<div class="sticky green t4 sticky-left" style="max-width:190px;">15+ видов за 2 месяца. леса. деревья похожие на земные тропики. растения которые двигаются навстречу. я думал найду тут странный мох и пару кустов. вместо этого нашёл полноценную, живую, активно реагирующую экосистему.</div>

  учитывая полное отсутствие животных (раздел будет позже), у меня есть гипотеза которую хочу сразу зафиксировать: вся "вторая ветвь" сложной жизни на Каэле, которая на Земле досталась бы животным,
  здесь ушла в грибы. это не доказано, это моё предположение, но визуально оно напрашивается — грибы тут разнообразнее и активнее чем я когда-либо видел на Земле, даже в учебных материалах.

      замерил рулеткой из аптечки, ножка толщиной у основания около 35 см. для сравнения, смотрел в архиве — самые крупные земные грибы (вроде гигантских дождевиков) редко превышают полметра в диаметре.
      этот гриб был размером почти с меня, я сфотографировался рядом для масштаба.

  у мелких трубчатых — встречал и <span class="mark-y">оранжевый</span> оттенок, единственный не-зелёный/пурпурный цвет свечения который вообще нашёл на планете.
</p>

      нашёл один экземпляр который рос спиралью — ножка изгибалась по дуге, делая почти полный оборот на высоте около <span class="hi">60 см</span>, прежде чем раскрыть шляпку.
      замерил угол закручивания на глаз — что-то близкое к логарифмической спирали, похожей на раковину наутилуса, но это не точный замер, просто визуальное сходство которое заметил.<br/><br/>
      другой экземпляр рос группой из <span class="hi">пяти</span> отдельных шляпок, расположенных идеально симметрично вокруг общего центра — расстояние между соседними шляпками отличалось не больше чем на <span class="hi">2–3 см</span>
      при общем диаметре группы около <span class="hi">70 см</span>. случайный рост обычно не даёт такой регулярности.

<div class="r-sep">СКОРОСТЬ РОСТА // ЗАМЕР ЗА ОДИН ПОЛНЫЙ ДЕНЬ КАЭЛЫ</div>

<p class="r-text">
  это то, что решил проверить экспериментально, потому что один маленький гриб который заметил вечером (по местному времени) на следующее утро выглядел заметно крупнее.
  поставил рядом палку с зарубками как примитивную линейку и замерил высоту того же экземпляра в течение одного полного дня Каэлы (<span class="hi">59 часов</span>).
</p>

<div class="hbox b" style="margin:14px 0;font-size:13px;">
  это даёт скорость роста порядка <span class="hi">0.3–0.35 см в час</span> на активной фазе — на Земле даже самые быстрорастущие грибы (вроде некоторых видов навозников) редко превышают такую скорость,
  хотя сравнение не совсем корректное, я не специалист по микологии и не знаю точных земных рекордов.
</div>

<div class="r-soca">Такая скорость роста требует очень высокой метаболической активности и постоянного доступа к воде и питательным веществам — что согласуется с общей картиной планеты, где вода циркулирует постоянно и почва, судя по всему, богата органикой.</div>

<p class="r-text" style="margin-top:12px;">
  взял образец ткани одного гриба на анализ. структура внутри — пористая, влажная, с многочисленными мелкими полостями, чем-то напоминает губку.
  цвет среза бледный, желтовато-белый, без выраженного свечения внутри (свет идёт только с поверхности шляпки).
</p>

<div class="r-note" style="transform:rotate(-0.5deg);margin-top:10px;">
  моя личная мысль, которую не могу подтвердить: если грибы действительно заменяют тут "животных" в экологическом смысле — может, именно их огромная биомасса и быстрый метаболизм участвуют в той самой циркуляции вещества которая делает почву такой "живой" (вспоминаю раздел 5, где почва восстанавливает форму после следов). это пока просто связывание точек у меня в голове, ничего не доказано.
</div>

<div class="sticky purple t2 sticky-right" style="max-width:190px;">8 видов грибов и я уверен что найду больше. один из них размером с меня. другой растёт спиралью. ни один из них не должен по логике расти так быстро. но растёт.</div>

<p class="r-text">
  обещал отдельный раздел про эту жидкость ещё когда писал про растения — вот он.<br/><br/>
  как уже отмечал в поправке к разделу 7: эта жидкость не привязана к одному виду. нашёл её у <span class="hi">6 из 15+</span> найденных видов растений, независимо от их формы и размера —
  встречается и у почвопокровных, и у кустарниковых, и у древовидных. у "тропического" вида (раздел 7) есть, у "костяного дерева" — нет вообще. закономерности по которой именно растения её содержат пока не вижу.
</p>

<div style="display:flex;gap:18px;align-items:flex-start;margin:16px 0;">
  <div style="flex:1;">
    <p class="r-text">
      <strong style="color:var(--g)">внешний вид.</strong> снаружи растения с этой жидкостью ничем не отличаются от обычных — обычный зелёный цвет, та же текстура, то же свечение если оно у вида есть.
      но если повредить стебель, ветку или лист — почти сразу начинает сочиться вязкая жидкость яркого <span class="mark-r">розово-фуксиевого</span> цвета.
      контраст резкий и довольно неожиданный с первого раза, когда это увидел — тогда случайно зацепил куст рукой, не специально, и был уверен на секунду что порезался сам и это кровь, пока не понял что цвет совсем не такой.
    </p>
  </div>
  <div style="flex-shrink:0;width:220px;">
    <div style="transform:rotate(2.5deg);">
      <div style="width:220px;height:220px;border:1px solid var(--border);background:rgba(0,0,0,0.6);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;cursor:pointer;">

      <div style="font-size:9px;color:var(--dimmer);margin-top:3px;text-align:center;letter-spacing:0.08em;">зелёное растение, из которого сочится розовая жидкость</div>

<p class="r-text">
  <strong style="color:var(--b)">консистенция.</strong> вязкая, как смола — не течёт быстро, скорее медленно стекает и довольно быстро застывает на воздухе.
  засекал время застывания на воздухе у одного образца — поверхностная плёнка начала формироваться примерно через <span class="hi">3–4 минуты</span>,
  полное затвердевание (насколько успел проверить) заняло около <span class="hi">25–30 минут</span>, после чего застывшая капля стала полупрозрачной, чуть темнее по цвету чем в жидком состоянии.<br/><br/>
  взял образец для анализа — собрал примерно <span class="hi">5 мл</span> в небольшой контейнер из аптечки.
</p>

<div class="r-soca">Базовый анализ жидкости показывает высокую вязкость (сопоставимую с земными растительными смолами), pH около 5.8 (слабокислая среда), и наличие органических соединений неустановленной структуры. Цветовой пигмент стабилен при контакте с воздухом — окисления, типичного для некоторых земных смол, не зафиксировано.</div>

<div class="r-sep" style="margin-top:18px;">ЧТО ЭТО МОЖЕТ БЫТЬ // ТРИ РАБОЧИЕ ГИПОТЕЗЫ</div>

<div class="g3" style="margin:14px 0;">
  <div class="hbox" style="font-size:12px;">
    <strong style="color:var(--g)">01. ЗАЩИТА</strong><br/>
    закрытие раны, отпугивание поедающих ткань. но на Каэле нет травоядных (раздел 11) — возможно наследие более раннего этапа эволюции, либо защита от микроорганизмов.
  </div>
  <div class="hbox b" style="font-size:12px;">
    <strong style="color:var(--b)">02. ПИТАНИЕ / ТРАНСПОРТ</strong><br/>
    аналог флоэмного сока — переносит питательные вещества. яркий цвет в таком случае просто побочный эффект состава, не намеренный сигнал.
  </div>
  <div class="hbox y" style="font-size:12px;">
    <strong style="color:var(--yellow)">03. ПСИОНИЧЕСКОЕ ПОЛЕ</strong><br/>
    <span class="corrupt">более спекулятивная.</span> цвет настолько яркий и неестественный что выглядит почти как намеренный сигнал, а не случайный продукт метаболизма.
  </div>
</div>

<div class="r-note" style="transform:rotate(-0.6deg);margin-top:10px;">

</div>

<div class="r-sep" style="margin-top:18px;">ВОПРОС: ВЛИЯЕТ ЛИ ЖИДКОСТЬ НА ЦВЕТ САМОГО РАСТЕНИЯ?</div>

<p class="r-text">
  я специально проверил это, раз уж задался вопросом. ответ — судя по всему, нет, по крайней мере не напрямую и не визуально.<br/><br/>
  растения с фуксиевой жидкостью внутри снаружи выглядят абсолютно так же, как растения без неё — тот же спектр зелёного, та же интенсивность, никакого розового или фиолетового оттенка
  не просачивается наружу через кожицу стебля или листа, даже у тонких полупрозрачных видов вроде "стеклянного плюща". специально рассматривал несколько экземпляров на просвет
  (так же как смотрел жилкование тропического листа) — жидкость внутри видна как более тёмные прожилки или участки, но цвет через ткань передаётся слабо, скорее как тень, а не как настоящий розовый.<br/><br/>
  это немного удивило, если честно — ожидал что такой яркий пигмент будет хоть немного "просвечивать". возможно внешняя оболочка содержит что-то вроде собственного зелёного пигмента,
  который полностью маскирует то, что находится под ним, как непрозрачный слой.
</p>

<div class="hbox r" style="margin:14px 0;font-size:13px;">
  единственное исключение которое нашёл — в местах механического повреждения (старый порез, место где ветка обломилась раньше) иногда виден едва заметный розоватый ободок по краю заживающей ткани,
  видимо остатки жидкости которая выступила и частично впиталась обратно в ткани при заживлении. но это не окрашивание самого растения, а просто след от старой раны.
</div>

<div class="r-soca">Отсутствие визуального проникновения пигмента через внешние ткани при значительной концентрации внутри указывает на эффективный барьерный механизм — вероятно специализированный слой клеток, аналогичный эпидермису некоторых земных растений, препятствующий миграции пигментированных соединений к поверхности.</div>

<div class="r-note" style="transform:rotate(0.7deg);margin-top:10px;">
  вывод: зелёный цвет снаружи — это отдельная, независимая система окраски, никак не связанная с тем что происходит внутри. растение как будто намеренно прячет эту яркость, пока его не повредишь.
</div>

  вкус — слегка горьковатый, с лёгким металлическим послевкусием, отдалённо напоминает что-то среднее между смолой хвойного дерева и недозрелой ягодой.
  никаких побочных эффектов не заметил в течение следующих суток наблюдения за собой.
</p>

<div class="hbox r" style="margin:14px 0;font-size:13px;">

<p class="r-text">

</p>

  моя рабочая гипотеза: вся та биологическая "ниша" которую на Земле заняли животные — подвижные организмы, питающиеся другими организмами или их частями — здесь либо не возникла вообще,

<p class="r-text">СОКА настояла чтобы я это написал. дословно: <span class="hi">"у тебя есть раздел про грибы длиннее, чем про собственное физическое состояние за пять месяцев миссии. это не приоритеты, это уклонение."</span> она не подбирает слова помягче никогда, я привык.<br/><br/>
ладно. пишу. мне 16 (в этом месяце исполнилось, если СОКА посчитала календарь верно — сам я потерял счёт задолго до дня рождения). я не первый год летаю — до Пандемониума было два других борта, режим был примерно такой же: работаю пока не падаю, потом сплю сколько получится, потом снова работаю. это не изменилось на Каэле. изменился только фон.</p>

<div style="display:flex;gap:18px;align-items:flex-start;margin-top:12px;">

    <div class="r-row"><span class="r-key">ПРОПУЩЕННЫХ ПРИЁМОВ ПИЩИ (МЕСЯЦ)</span><span class="r-val r">13</span></div>
    <div class="r-row"><span class="r-key">ИЗМЕНЕНИЕ ВЕСА С ПОСАДКИ</span><span class="r-val y">−3.4 кг</span></div>
  </div>
  <div class="sticky yellow t3 sticky-right" style="width:190px;flex-shrink:0;">разброс сна — от полутора часов (после находки светящегося образца, раздел 9, не мог уснуть пока не понял что с ним происходит — не понял до сих пор, перестал ждать) до почти 11 часов, когда физически рухнул после 61 часа без сна на картографировании плато.</div>
</div>

<div class="r-soca">Данная модель поведения зафиксирована ещё до посадки на Каэлу, в бортовых логах предыдущих двух миссий пилота. Планета не является причиной паттерна. Планета — контекст, в котором паттерн продолжает существовать без изменений.</div>

<p class="r-text" style="margin-top:10px;">СОКА права, и мне нечего возразить, кроме того что это работает — я закончил картографирование плато, классифицировал больше видов грибов чем планировал, нашёл стеклянную лилию именно потому что не остановился на "уже поздно, я устал" в тот вечер. не оправдание. просто как я функционирую, записываю честно, вряд ли изменю.</p>

<div class="r-smaily">окей, я обычно не влезаю в личные разделы, но раз тут прямым текстом про меня как медика: 13 пропущенных приёмов пищи за месяц — это не "я так работаю", это "мой пилот забывает что у него есть тело". нотации читать не буду (СОКА уже прочитала за нас двоих), просто оставлю тут напоминание на видном месте — потому что забочусь и потому что сам так решил.</div>

<div style="display:flex;gap:18px;align-items:flex-start;margin-top:14px;">
  <p class="r-text" style="flex:1;">
    <strong style="color:var(--g2)">концентрация и гиперфокус.</strong> замечаю за собой больше всего, сложнее всего описать точно. когда что-то захватывает — а на Каэле захватывает почти всё — теряю ощущение времени полностью, не метафорически.
    однажды просидел над образцом кристалла (раздел 6) семь часов подряд, зарисовывая под разными углами, вышел из этого только потому что у СОКи сработал таймер проверки скафандра, не потому что почувствовал усталость. в моменте я не устаю. усталость приходит потом, разом, будто копилась всё это время.
  </p>
  <div class="sticky blue t5 sticky-right" style="width:180px;flex-shrink:0;">не новый паттерн, знаю его годами. но раньше рядом были другие на борту, которые могли перебить, вытащить. тут — только СОКА и СМАЙЛИ, и оба это делают по-своему, но это не то же, что живой человек, который хлопнет по плечу.</div>
</div>
<div class="clearfix"></div>

<p class="r-text" style="margin-top:10px;">
  <strong style="color:var(--yellow)">эмоциональный фон.</strong> не буду делать вид что это ровная линия. бывают дни (обычно после крупной находки — колокольчики-паразиты, разбор среза породы) когда энергии столько, что работаю сутками без ощущения нагрузки вообще — субъективно прекрасно, продуктивно, ясно. знаю по опыту прошлых миссий, что за этим следует откат: день-два, когда всё тяжелее обычного, концентрация рассыпается, раздражаюсь на мелочи (в основном на собственные ошибки в расчётах). единственное что помогает — просто пережить это, не форсируя.
  СОКА называет это "циклической моделью продуктивности с предсказуемыми фазами истощения". я называю это "просто как я устроен". обе правы, просто разный словарь.
</p>

<strong style="color:var(--g)">счёт дням я потерял.</strong> не метафорически. СОКА ведёт день-счётчик, я на него смотрю в отчётах — без неё не назвал бы сейчас номер дня даже с точностью до недели. первые три-четыре недели держал в голове сам, потом просто перестал — не решение, счётчик в голове тихо выключился, когда понял что дни тут не делятся на понятные куски привычным способом.</p>

<div class="g2" style="margin-top:10px;">

    ощущаю время как один длинный нерасчленённый поток с отдельными событиями (нашёл лилию, доел плод, СОКА выругалась на расчёт), а не пронумерованными сутками.

function renderIndex(reports){
  const list=document.getElementById('index-list');
  list.innerHTML='';
  reports.forEach(r=>{
    const el=document.createElement('div');
    el.className='report-entry';el.id='entry-'+r.id;
    el.innerHTML=`<div class="entry-code">${r.code}</div><div class="entry-title">${r.title}</div><div class="entry-meta"><span class="entry-tag ${r.tag}">${r.tagLabel}</span><span class="entry-date">${r.date}</span></div>`;
    el.onclick=()=>openReport(r);
    list.appendChild(el);
  });
  document.getElementById('entry-count').textContent=reports.length;
}

function openReport(r){
  document.querySelectorAll('.report-entry').forEach(e=>e.classList.remove('active'));
  const ee=document.getElementById('entry-'+r.id);if(ee)ee.classList.add('active');
  document.getElementById('viewer-empty').style.display='none';
  const vc=document.getElementById('viewer-content');vc.style.display='flex';
  const tb=document.getElementById('report-tabs'),rv=document.getElementById('report-viewer');
  tb.innerHTML='';rv.innerHTML='';
  r.tabs.forEach((t,i)=>{
    const tab=document.createElement('div');
    tab.className='report-tab'+(i===0?' active':'');
    tab.textContent=t.label;tab.onclick=()=>switchTab(r,t.id);
    tb.appendChild(tab);
    const c=document.createElement('div');
    c.className='tab-content'+(i===0?' active':'');
    c.id='tab-'+r.id+'-'+t.id;c.innerHTML=t.html;
    rv.appendChild(c);
  });
  document.getElementById('bb-active').textContent=r.code+' // '+r.title;
  rv.scrollTop=0;
}

function switchTab(r,tabId){
  document.querySelectorAll('.report-tab').forEach((t,i)=>{t.classList.toggle('active',r.tabs[i]?.id===tabId);});
  document.querySelectorAll('.tab-content').forEach(c=>{c.classList.toggle('active',c.id==='tab-'+r.id+'-'+tabId);});
  document.getElementById('report-viewer').scrollTop=0;
}

function filterReports(q){
  const l=q.toLowerCase();
  renderIndex(REPORTS.filter(r=>r.title.toLowerCase().includes(l)||r.code.toLowerCase().includes(l)||r.tagLabel.toLowerCase().includes(l)));
}

renderIndex(REPORTS);

function setFavicon(symbol, rotate = 0) {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 64, 64);
  const centerX = 32;
  const centerY = 32;
  ctx.save();
  if (rotate !== 0) {
    ctx.translate(centerX, centerY);
    ctx.rotate(rotate * Math.PI / 180);
    ctx.translate(-centerX, -centerY);
  }
  ctx.font = '48px "VT323", "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const gradient = ctx.createLinearGradient(16, 16, 48, 48);
  gradient.addColorStop(0, '#00ff88');
  gradient.addColorStop(0.6, '#00ffcc');
  gradient.addColorStop(1, '#0088ff');
  ctx.fillStyle = gradient;
  ctx.fillText(symbol, centerX, centerY);
  ctx.restore();
  let link = document.querySelector("link[rel*='icon']");
  if (!link) {
    link = document.createElement('link');
    link.rel = 'shortcut icon';
    document.head.appendChild(link);
  }
  link.href = canvas.toDataURL('image/png');
}

// Заметное "разъедание" отдельных слов в открытом отчёте
const corruptCharsRep = '█░▒▓■□▪▫';
function corruptTextRep(str, intensity = 0.35) {
  return str.split('').map(c => (c !== ' ' && Math.random() < intensity) ? corruptCharsRep[Math.floor(Math.random()*corruptCharsRep.length)] : c).join('');
}
function glitchRandomWords() {
  if (document.hidden) return;
  const viewer = document.getElementById('report-viewer');
  if (!viewer) return;
  const leafs = [];
  viewer.querySelectorAll('.r-text, .r-soca, .sticky').forEach(block => {
    block.querySelectorAll('*').forEach(n => {
      if (n.children.length === 0 && n.textContent.trim().split(/\s+/).length >= 3 && !n.dataset.glitching) leafs.push(n);
    });
    if (block.children.length === 0 && block.textContent.trim().split(/\s+/).length >= 3 && !block.dataset.glitching) leafs.push(block);
  });
  if (!leafs.length) return;
  const el = leafs[Math.floor(Math.random() * leafs.length)];
  const words = el.textContent.split(/(\s+)/);
  const wordIdxs = words.map((w,i)=>i).filter(i => words[i].trim().length > 2);
  if (!wordIdxs.length) return;
  const pickCount = Math.random() < 0.5 ? 1 : 2;
  const picked = new Set();
  for (let k = 0; k < pickCount; k++) picked.add(wordIdxs[Math.floor(Math.random()*wordIdxs.length)]);
  el.dataset.glitching = '1';
  const original = el.textContent;
  const styles = ['c1','c2','c3','heavy-corrupt'];
  const html = words.map((w,i) => {
    if (picked.has(i)) {
      const cls = styles[Math.floor(Math.random()*styles.length)] + ' word-flash';
      return `<span class="${cls}">${corruptTextRep(w, 0.4)}</span>`;
    }
    return w;
  }).join('');
  el.innerHTML = html;
  setTimeout(() => { el.textContent = original; delete el.dataset.glitching; }, 420);
}
setInterval(glitchRandomWords, 1600);
